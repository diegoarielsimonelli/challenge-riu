<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
  @for (card of cards; track card.id) {
    <div class="flex flex-col gap-4">
      <!-- Contenedor de Imagen -->
      <div
        class="bg-[#BDBDBD] aspect-video rounded-sm flex items-center justify-center"
      >
        <span class="text-[#A6A2A2] font-bold text-2xl uppercase font-figtree"
          >Image</span
        >
      </div>

      <!-- Icono + Texto corto -->
      <div class="flex items-center gap-2 text-[16px] font-bold">
        <!--  SVG de Calendario y Subtitulo -->
        <app-svg-card></app-svg-card>

        <span>{{ card.subtitle }}.</span>
      </div>

      <!-- Textos principales -->
      <div class="flex flex-col gap-3">
        <h3 class="text-2xl font-bold min-h-16">
          {{ card.title }}
        </h3>
        <p class="text-[16px] text-[#343A40] leading-6 line-clamp-6">
          {{ card.fullText }}
        </p>
      </div>
    </div>
  }
</div>
